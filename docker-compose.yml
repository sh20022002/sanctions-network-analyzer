version: '3.9'

services:
  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sanctions-analyzer
    environment:
      - PYTHONUNBUFFERED=1
      - OPENCORPORATES_API_TOKEN=${OPENCORPORATES_API_TOKEN:-}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
    volumes:
      # Mount data directories for input/output
      - ./data:/app/data
      - ./export:/app/export
      # Optional: mount .env for configuration
      - ./.env:/app/.env:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - sanctions-network
    # Override for running interactive analysis
    stdin_open: true
    tty: true

  # Neo4j database service (optional but recommended)
  neo4j:
    image: neo4j:5.24-community
    container_name: sanctions-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_server_memory_heap_initial_size=512m
      - NEO4J_server_memory_heap_max_size=1024m
    ports:
      # Neo4j Browser UI
      - "7474:7474"
      # Bolt protocol (for Neo4j queries & exports)
      - "7687:7687"
    volumes:
      # Persistent data storage
      - neo4j-data:/var/lib/neo4j/data
      - neo4j-logs:/var/lib/neo4j/logs
    networks:
      - sanctions-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  sanctions-network:
    driver: bridge

volumes:
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
